name: Check tor image for apk updates

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  packages: read

jobs:
  check-updates:
    runs-on: ubuntu-latest

    steps:
      - name: Login to GitHub Container Registry	
        uses: docker/login-action@v4	
        with:	
          registry: ghcr.io	
          username: ${{ github.repository_owner }}	
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Ensure label exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          gh label create apk-update \
            --repo "$REPO" \
            --color "1d76db" \
            --description "APK package updates available in container image" \
            --force

      - name: Check apk updates in container
        id: check
        run: |
          set -euo pipefail

          OUTPUT="$(
            docker run --rm --user root ghcr.io/svengo/tor:latest \
              ash -c "apk update; apk version -l '<'"
          )"

          {
            echo "result<<EOF"
            echo "$OUTPUT"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          if [ -n "$(printf '%s' "$OUTPUT" | tr -d '[:space:]')" ]; then
            echo "has_updates=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_updates=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create issue
        if: steps.check.outputs.has_updates == 'true'
        id: create_issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          OWNER: ${{ github.repository_owner }}
          ISSUE_TITLE: "APK updates available in ghcr.io/svengo/tor:latest"
          ISSUE_BODY: |
            Package updates were found in the container image `ghcr.io/svengo/tor:latest`.

            Command used:
            ```sh
            ash -c "apk update; apk version -l '<'"
            ```

            Output:
            ```text
            ${{ steps.check.outputs.result }}
            ```

            Workflow: `${{ github.workflow }}`
            Run: `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`
        run: |
          set -euo pipefail

          ISSUE_NUMBER="$(
            gh issue list \
              --repo "$REPO" \
              --state open \
              --search "in:title \"$ISSUE_TITLE\"" \
              --json number,title \
              --jq '.[] | select(.title == "'"$ISSUE_TITLE"'") | .number' \
              | head -n 1
          )"

          if [ -n "$ISSUE_NUMBER" ]; then
            echo "issue_number=$ISSUE_NUMBER" >> "$GITHUB_OUTPUT"
            echo "created=false" >> "$GITHUB_OUTPUT"
          else
            ISSUE_URL="$(
              gh issue create \
                --repo "$REPO" \
                --title "$ISSUE_TITLE" \
                --body "$ISSUE_BODY" \
                --label "apk-update" \
                --assignee "$OWNER"
            )"

            ISSUE_NUMBER="${ISSUE_URL##*/}"

            echo "issue_number=$ISSUE_NUMBER" >> "$GITHUB_OUTPUT"
            echo "created=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Update existing issue
        if: steps.check.outputs.has_updates == 'true' && steps.create_issue.outputs.created == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          OWNER: ${{ github.repository_owner }}
          ISSUE_NUMBER: ${{ steps.create_issue.outputs.issue_number }}
          ISSUE_TITLE: "APK updates available in ghcr.io/svengo/tor:latest"
          ISSUE_BODY: |
            Package updates were found in the container image `ghcr.io/svengo/tor:latest`.

            Command used:
            ```sh
            ash -c "apk update; apk version -l '<'"
            ```

            Output:
            ```text
            ${{ steps.check.outputs.result }}
            ```

            Workflow: `${{ github.workflow }}`
            Run: `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`
        run: |
          set -euo pipefail

          gh issue edit "$ISSUE_NUMBER" \
            --repo "$REPO" \
            --title "$ISSUE_TITLE" \
            --body "$ISSUE_BODY" \
            --add-label "apk-update" \
            --add-assignee "$OWNER"

      - name: Close existing issue when no updates are available
        if: steps.check.outputs.has_updates == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          ISSUE_TITLE: "APK updates available in ghcr.io/svengo/tor:latest"
          CLOSE_COMMENT: |
            No pending APK updates were found.

            Command used:
            ```sh
            ash -c "apk update; apk version -l '<'"
            ```

            The current check returned no available updates.
        run: |
          set -euo pipefail

          ISSUE_NUMBER="$(
            gh issue list \
              --repo "$REPO" \
              --state open \
              --search "in:title \"$ISSUE_TITLE\"" \
              --json number,title \
              --jq '.[] | select(.title == "'"$ISSUE_TITLE"'") | .number' \
              | head -n 1
          )"

          if [ -n "$ISSUE_NUMBER" ]; then
            gh issue close "$ISSUE_NUMBER" \
              --repo "$REPO" \
              --comment "$CLOSE_COMMENT"
          else
            echo "No open issue found to close."
          fi

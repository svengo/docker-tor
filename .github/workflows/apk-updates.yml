name: Check tor image for apk updates

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  packages: read

concurrency:
  group: apk-updates-${{ github.repository }}
  cancel-in-progress: false

jobs:
  check-updates:
    runs-on: ubuntu-latest
    env:
      CONTAINER_IMAGE: ghcr.io/${{ github.repository_owner }}/${{ vars.IMAGE_NAME }}:latest
      ISSUE_LABEL: apk-update
      APK_CHECK_CMD: apk --quiet update; apk --quiet version -l '<'

    steps:
      - name: Login to GitHub Container Registry	
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
        with:	
          registry: ghcr.io	
          username: ${{ github.repository_owner }}	
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Ensure label exists
        uses: actions/github-script@v9
        with:
          script: |
            try {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'apk-update',
                color: '1d76db',
                description: 'APK package updates available in container image',
              });
            } catch (error) {
              // Label already exists, ignore error
              if (error.status !== 422) throw error;
            }

      - name: Check apk updates in container
        id: check
        run: |
          set -euo pipefail
          OUTPUT="$(
            docker run --rm --user root "$CONTAINER_IMAGE" ash -c "$APK_CHECK_CMD"
          )"

          {
            echo "result<<EOF"
            echo "$OUTPUT"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          if [ -n "$(printf '%s' "$OUTPUT" | tr -d '[:space:]')" ]; then
            echo "has_updates=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_updates=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Find or create issue
        id: issue
        uses: actions/github-script@v9
        with:
          script: |
            const issueTitle = `APK updates available in ${{ env.CONTAINER_IMAGE }}`;
            
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: ['apk-update'],
            });

            const existingIssue = issues.data.find(issue => issue.title === issueTitle);

            if (existingIssue) {
              core.setOutput('issue_number', existingIssue.number);
              core.setOutput('exists', 'true');
            } else {
              core.setOutput('exists', 'false');
            }

      - name: Create new issue if updates found
        if: steps.check.outputs.has_updates == 'true' && steps.issue.outputs.exists == 'false'
        uses: actions/github-script@v9
        with:
          script: |
            const issueTitle = `APK updates available in ${{ env.CONTAINER_IMAGE }}`;
            const issueBody = `Package updates were found in the container image \`${{ env.CONTAINER_IMAGE }}\`.

            Command used:
            \`\`\`sh
            ${{ env.APK_CHECK_CMD }}
            \`\`\`

            Output:
            \`\`\`text
            ${{ steps.check.outputs.result }}
            \`\`\`

            Workflow: \`${{ github.workflow }}\`
            Run: \`${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\``;

            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: issueTitle,
              body: issueBody,
              labels: ['apk-update'],
              assignees: [context.repo.owner],
            });

            console.log(`Issue created: ${issue.data.html_url}`);

      - name: Update existing issue if updates found
        if: steps.check.outputs.has_updates == 'true' && steps.issue.outputs.exists == 'true'
        uses: actions/github-script@v9
        with:
          script: |
            const issueTitle = `APK updates available in ${{ env.CONTAINER_IMAGE }}`;
            const issueBody = `Package updates were found in the container image \`${{ env.CONTAINER_IMAGE }}\`.

            Command used:
            \`\`\`sh
            ${{ env.APK_CHECK_CMD }}
            \`\`\`

            Output:
            \`\`\`text
            ${{ steps.check.outputs.result }}
            \`\`\`

            Workflow: \`${{ github.workflow }}\`
            Run: \`${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\``;

            const issueNumber = ${{ steps.issue.outputs.issue_number }};

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              title: issueTitle,
              body: issueBody,
            });

            // Add label if not already present
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              labels: ['apk-update'],
            });

            // Add assignee if not already assigned
            await github.rest.issues.addAssignees({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              assignees: [context.repo.owner],
            });

      - name: Close issue if no updates available
        if: steps.check.outputs.has_updates == 'false' && steps.issue.outputs.exists == 'true'
        uses: actions/github-script@v9
        with:
          script: |
            const closeComment = `No pending APK updates were found.

            Command used:
            \`\`\`sh
            ${{ env.APK_CHECK_CMD }}
            \`\`\`

            The current check returned no available updates.`;

            const issueNumber = ${{ steps.issue.outputs.issue_number }};

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: closeComment,
            });

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              state: 'closed',
            });

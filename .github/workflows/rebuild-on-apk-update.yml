name: Rebuild Docker on APK Updates

on:
  schedule:
    - cron: '30 5 * * *'
  workflow_dispatch:

permissions:
  contents: read
  packages: read
  actions: write

jobs:
  check-and-rebuild:
    runs-on: ubuntu-latest

    steps:
      - name: Login to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check APK updates
        id: check
        run: |
          set -uo pipefail
          
          IMAGE="ghcr.io/${{ github.repository_owner }}/${{ vars.IMAGE_NAME }}:latest"
          docker pull -q "$IMAGE"
          
          OUTPUT=$(docker run --rm --user root "$IMAGE" ash -c "apk --quiet update; apk --quiet version -l '<'" || echo "")
          
          {
            echo "result<<EOF"
            echo "$OUTPUT"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          
          if [ -z "$(echo "$OUTPUT" | tr -d '[:space:]')" ]; then
            echo "has_updates=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_updates=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Print APK updates
        if: steps.check.outputs.has_updates == 'true'
        run: |
          echo "Available APK updates:"
          echo "${{ steps.check.outputs.result }}"

      - name: Checkout
        if: steps.check.outputs.has_updates == 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
          
      - name: Trigger rebuild
        id: rebuild
        if: steps.check.outputs.has_updates == 'true'
        run: |
          set -uo pipefail
          
          # Get the last successful run of publish-docker.yml triggered by a release event
          RUN_ID=$(gh run list \
            --workflow=publish-docker.yml \
            --status=success \
            --event=release \
            --limit=1 \
            --json=databaseId \
            --jq='.[0].databaseId // empty')
          
          if [ -n "$RUN_ID" ]; then
            echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"
            gh run rerun "$RUN_ID"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            echo "error=No successful release-triggered run found" >> "$GITHUB_OUTPUT"
            exit 1
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        if: always()
        run: |
          {
            echo "## APK Update Check"
            echo ""
            if [ "${{ steps.check.outputs.has_updates }}" = "true" ]; then
              echo ""
              echo "### Available Updates"
              echo "\`\`\`"
              echo "${{ steps.check.outputs.result }}"
              echo "\`\`\`"
              echo ""
              if [ "${{ steps.rebuild.outcome }}" = "success" ]; then
                echo "✅ Docker rebuild triggered (Run ID: ${{ steps.rebuild.outputs.run_id }})"
              else
                echo "❌ Failed to trigger rebuild: ${{ steps.rebuild.outputs.error }}"
              fi
            else
              echo ""
              echo "ℹ️ No updates available"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

name: Build and Publish Docker Image

on:
  workflow_dispatch:
  push:
    branches:
      - main
  release:
    types: [published]

jobs:
  docker:
    permissions:
      # permission needed for editing releases
      contents: write
      packages: write
      # permissions needed for attestations
      id-token: write
      attestations: write
    runs-on: ubuntu-latest
    steps:
    -
      name: Checkout
      uses: actions/checkout@v7
    -
      name: Set up QEMU
      uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3
    -
      name: Set up Docker Buildx
      uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5
    -
      name: Login to Docker Hub
      uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
      with:
        username: ${{ vars.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    -
      name: Login to GitHub Container Registry
      uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
      with:
        registry: ghcr.io
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GITHUB_TOKEN }}
    -
      name: Update Docker Hub description
      uses: peter-evans/dockerhub-description@1b9a80c056b620d92cedb9d9b5a223409c68ddfa
      with:
        username: ${{ vars.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
        repository: ${{ vars.DOCKERHUB_USERNAME }}/${{ vars.IMAGE_NAME }}
        short-description: ${{ github.event.repository.description }}
    -
      name: Build Docker meta data
      id: meta
      uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9
      with:
        images: |
          ${{ vars.DOCKERHUB_USERNAME }}/${{ vars.IMAGE_NAME }}
          ghcr.io/${{ github.repository_owner }}/${{ vars.IMAGE_NAME }}
        flavor: |
          latest=${{ github.event_name == 'release' && github.event.release.prerelease == false }}
        tags: |
          type=match,pattern=^v?((?:\d+\.){3}\d+),group=1,enable=${{ github.event_name == 'release'  && github.event.release.prerelease == false }}
          type=match,pattern=^v?(.*),group=1,enable=${{ github.event_name == 'release'  && github.event.release.prerelease == false }}
          type=sha
    -
      name: Build and push Docker image
      uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
      id: push
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        platforms: linux/amd64
    -
      name: Attest DockerHub
      uses: actions/attest-build-provenance@v4
      with:
        subject-name: docker.io/${{ vars.DOCKERHUB_USERNAME }}/${{ vars.IMAGE_NAME }}
        subject-digest: ${{ steps.push.outputs.digest }}
        push-to-registry: true
    -
      name: Attest ghcr
      uses: actions/attest-build-provenance@v4
      with:
        subject-name: ghcr.io/${{ github.repository_owner }}/${{ vars.IMAGE_NAME }}
        subject-digest: ${{ steps.push.outputs.digest }}
        push-to-registry: true
    -
      name: Generate job summary
      id: job-summary
      run: |
        SUMMARY=$(printf '%s\n' "## Docker tags" '```' ${DOCKER_METADATA_OUTPUT_TAGS} '```')
        echo "summary<<EOF" >> $GITHUB_OUTPUT
        echo "$SUMMARY" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT
        printf '%s\n' "$SUMMARY" >> "$GITHUB_STEP_SUMMARY"
    - 
      name: Append job summary to release notes
      if: ${{ github.event_name == 'release' && github.event.action == 'published' }}
      uses: actions/github-script@v9
      env:
        SUMMARY: ${{ steps.job-summary.outputs.summary }}
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          const summary = process.env.SUMMARY;
          const currentBody = context.payload.release.body || '';
    
          const body = [currentBody.trim(), summary]
            .filter(Boolean)
            .join('\n\n');
    
          await github.rest.repos.updateRelease({
            owner: context.repo.owner,
            repo: context.repo.repo,
            release_id: context.payload.release.id,
            body
          });

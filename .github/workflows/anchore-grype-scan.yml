# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

# This workflow performs container image vulnerability scans with Anchore's Grype tool.
# For more information on the Anchore scan action usage and parameters,
# see https://github.com/anchore/scan-action. For more information on Anchore's
# container image scanning tool Grype, see https://github.com/anchore/grype
name: Anchore Grype Vulnerability Scan

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'  # Daily at 6 AM UTC

permissions:
  contents: read

jobs:
  build-and-scan:
    name: Build and Scan Docker Image
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    permissions:
      contents: read
      actions: read
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@v6
      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5
      - name: Build Docker image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
        with:
          context: .
          file: ./Dockerfile
          outputs: type=docker,dest=/tmp/testimage.tar
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
      - name: Run Anchore Grype scan
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2
        id: scan
        with:
          image: /tmp/testimage.tar
          output-format: table
          fail-build: false
          severity-cutoff: critical
      - name: Generate job summary
        run: |
          {
            IFS=$'\n'
            echo '## Anchore Grype Vulnerability Report'
            echo '```'
            cat '${{ steps.scan.outputs.table }}'
            echo '```'
          } >> $GITHUB_STEP_SUMMARY

  scan-published-image:
    name: Scan Published Docker Image
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      security-events: write
      actions: read
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@v6
      - name: Login to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Pull the Docker image
        run: |
          docker pull ghcr.io/${{ github.repository_owner }}/${{ vars.IMAGE_NAME }}:latest
      - name: Run Anchore Grype scan
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2
        id: scan
        with:
          image: ghcr.io/${{ github.repository_owner }}/${{ vars.IMAGE_NAME }}:latest
          output-format: sarif
          output-file: sarif-${{ github.run_id }}-${{ job.check_run_id }}.json
          fail-build: false
          severity-cutoff: critical
      - name: Upload vulnerability report
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ${{ steps.scan.outputs.sarif }}
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: sarif file
          path: ${{ steps.scan.outputs.sarif }}
          archive: false

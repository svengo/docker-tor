# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

# This workflow checks out code, builds an image, performs a container image
# vulnerability scan with Anchore's Grype tool.
# For more information on the Anchore scan action usage
# and parameters, see https://github.com/anchore/scan-action. For more
# information on Anchore's container image scanning tool Grype, see
# https://github.com/anchore/grype
name: Anchore Grype vulnerability scan

on:
  push:
    branches: [ "main" ]
  pull_request:
    # The branches below must be a subset of the branches above
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  Anchore-Build-Scan:
    permissions:
      contents: read # for actions/checkout to fetch code
      actions: read # only required for a private repository by github/codeql-action/upload-sarif to get the Action run status
    runs-on: ubuntu-latest
    steps:
    -
      name: Check out the code
      uses: actions/checkout@v6
    -
      name: Set up QEMU
      uses: docker/setup-qemu-action@v4
    -
      name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4
    -
      name: Build Docker image
      uses: docker/build-push-action@v7
      with:
        context: .
        file: ./Dockerfile
        outputs: type=docker,dest=/tmp/testimage.tar
        cache-from: type=gha
        cache-to: type=gha,mode=max
        platforms: linux/amd64
    -
      name: Run the Anchore Grype scan action
      uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2
      id: scan
      with:
        image: /tmp/testimage.tar
        output-format: table
        fail-build: false
    -
      name: Generate job summary
      id: job-summary
      if: always()
      run: |
        {
          IFS=$'\n'
          echo "## Vulnerability Report Summary"
          echo '```'
          cat '${{ steps.scan.outputs.table }}'
          echo '```'
        } >> $GITHUB_STEP_SUMMARY

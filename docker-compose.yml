services:
  daemon:
    image: svengo/tor:latest
    build: .
    env_file: docker-compose.env
    ports:
      - ${ORPORT:-9001}:${ORPORT:-9001}
      - ${DIRPORT:-9030}:${DIRPORT:-9030}
      # Uncomment the following line to expose the control port (localhost only by default for security)
      # - 127.0.0.1:${CONTROLPORT:-9051}:${CONTROLPORT:-9051}
      # Uncomment the following line to expose the SOCKS proxy (localhost only by default for security)
      # - 127.0.0.1:${SOCKS_PORT:-9050}:${SOCKS_PORT:-9050}
    volumes:
      - data:/data
    restart: no

volumes:
  data:
